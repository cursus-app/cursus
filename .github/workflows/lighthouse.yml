name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Placeholders requis par le serveur Nuxt au démarrage (nuxt preview)
    # DATABASE_URL non-vide évite le throw du singleton Prisma sans connexion réelle
    env:
      DATABASE_URL: postgresql://placeholder
      DIRECT_URL: postgresql://placeholder
      NUXT_PUBLIC_SUPABASE_URL: http://placeholder
      NUXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - name: Build
        env:
          NODE_ENV: production
        run: pnpm build
      - name: Lighthouse CI
        # Non-bloquant tant que l'app n'est pas déployée en preview Vercel
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Cf. 09-engineering-playbook §8.1 (perf budgets)
          urls: |
            http://localhost:3000/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
          runs: 3
