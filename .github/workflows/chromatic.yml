name: Chromatic

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same branch
concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual regression (Chromatic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-bloquant tant que CHROMATIC_PROJECT_TOKEN n'est pas configuré dans les secrets GitHub
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic a besoin de l'historique pour TurboSnap
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook + publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: storybook:build
          onlyChanged: true
          exitOnceUploaded: true
          exitZeroOnChanges: ${{ github.event_name == 'pull_request' }}
