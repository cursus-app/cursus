<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Micro-interaction signature (XP) — Cursus Design System</title>
    <!-- Référence statique extraite de Claude Design « Design system Cursus ».
         Validation d'un livrable → sparkle + bounce léger du badge XP.
         Jamais de feedback négatif sur « Je suis bloqué ». -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="./_tokens.css" />
    <style>
      body {
        padding: 32px;
      }
      .card {
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        background: var(--bg-surface);
        padding: 30px;
        display: flex;
        align-items: center;
        gap: 24px;
        flex-wrap: wrap;
        max-width: 760px;
      }
      .validate {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 40px;
        padding: 0 18px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .validate:hover {
        background: var(--accent-hover);
      }
      .xp {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        border-radius: 9999px;
        background: var(--accent-subtle);
        color: var(--accent-text);
        font-weight: 700;
        font-size: 14px;
      }
      .xp .spark {
        position: absolute;
        top: -8px;
        right: -6px;
        font-size: 16px;
        color: var(--warning-solid);
        opacity: 0;
      }
      .pop {
        animation: cz-pop 450ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .sparkle {
        animation: cz-spark 700ms ease-out;
      }
      @keyframes cz-pop {
        0% {
          transform: scale(0.6);
          opacity: 0;
        }
        55% {
          transform: scale(1.18);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes cz-spark {
        0% {
          transform: scale(0) rotate(0deg);
          opacity: 0;
        }
        40% {
          opacity: 1;
        }
        100% {
          transform: scale(1.4) rotate(35deg);
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .pop,
        .sparkle {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <h1 style="font-size: 25px; color: var(--text-strong); margin: 0 0 6px">
      Micro-interaction signature
    </h1>
    <p style="color: var(--text-muted); margin: 0 0 22px; max-width: 620px">
      Validation d'un livrable → sparkle + bounce léger du badge XP. Jamais de feedback négatif sur
      « Je suis bloqué ».
    </p>
    <div class="card">
      <button class="validate" onclick="triggerXp()">
        <i class="ti ti-circle-check" style="font-size: 17px"></i>Valider le livrable
      </button>
      <div class="xp">
        <i class="ti ti-bolt" style="font-size: 16px"></i>
        <span id="xpVal" style="display: inline-block">+120 XP</span>
        <i class="ti ti-sparkles spark" id="spark"></i>
      </div>
      <span style="font-size: 12.5px; color: var(--text-subtle)">clique « Valider » →</span>
    </div>
    <script>
      const xps = [80, 120, 150, 200];
      let i = 0;
      function triggerXp() {
        const val = document.getElementById("xpVal");
        const spark = document.getElementById("spark");
        i = (i + 1) % xps.length;
        val.textContent = "+" + xps[i] + " XP";
        val.classList.remove("pop");
        spark.classList.remove("sparkle");
        void val.offsetWidth; // reflow pour rejouer l'animation
        val.classList.add("pop");
        spark.classList.add("sparkle");
      }
    </script>
  </body>
</html>
