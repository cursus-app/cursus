<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badge · Tag · Avatar · Kbd · Tooltip · Skeleton — Cursus Design System</title>
    <!-- Référence statique extraite de Claude Design « Design system Cursus ». -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="./_tokens.css" />
    <style>
      body {
        padding: 32px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        max-width: 820px;
      }
      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .card {
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        background: var(--bg-surface);
        padding: 22px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge i {
        font-size: 14px;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 6px 4px 11px;
        border-radius: 7px;
        font-size: 12.5px;
      }
      .kbd {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        padding: 2px 7px;
        border: 1px solid var(--border-default);
        border-bottom-width: 2px;
        border-radius: 5px;
        background: var(--bg-subtle);
        color: var(--text-default);
      }
      .avatar {
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        font-weight: 600;
      }
      .skel {
        height: 12px;
        border-radius: 5px;
        background: linear-gradient(
          90deg,
          var(--bg-muted) 0%,
          var(--bg-hover) 50%,
          var(--bg-muted) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s linear infinite;
      }
      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <h1 style="font-size: 25px; color: var(--text-strong); margin: 0 0 22px">
      Badge · Tag · Avatar · Kbd · Tooltip · Skeleton
    </h1>
    <div class="grid">
      <div class="card">
        <div class="ds-section-title">Badges de statut</div>
        <div class="ds-row">
          <span class="badge" style="background: var(--success-bg); color: var(--success-fg)"
            ><i class="ti ti-circle-check"></i>Validé</span
          >
          <span class="badge" style="background: var(--info-bg); color: var(--info-fg)"
            ><i class="ti ti-progress"></i>En cours</span
          >
          <span class="badge" style="background: var(--warning-bg); color: var(--warning-fg)"
            ><i class="ti ti-alert-triangle"></i>Alerte</span
          >
          <span class="badge" style="background: var(--danger-bg); color: var(--danger-fg)"
            ><i class="ti ti-clock-exclamation"></i>Retard</span
          >
          <span class="badge" style="background: var(--bg-muted); color: var(--text-muted)"
            >Brouillon</span
          >
        </div>
        <div class="ds-section-title" style="margin-top: 20px">Tags fermables</div>
        <div class="ds-row">
          <span
            class="tag"
            style="border: 1px solid var(--border-default); background: var(--bg-app); color: var(--text-default)"
            >Semaine 04<i class="ti ti-x" style="font-size: 14px; color: var(--text-subtle)"></i
          ></span>
          <span
            class="tag"
            style="border: 1px solid var(--accent-border); background: var(--accent-subtle); color: var(--accent-text)"
            >IA<i class="ti ti-x" style="font-size: 14px"></i
          ></span>
        </div>
        <div class="ds-section-title" style="margin-top: 20px">Raccourcis (Kbd)</div>
        <div class="ds-row">
          <span style="display: inline-flex; gap: 3px"
            ><kbd class="kbd">⌘</kbd><kbd class="kbd">K</kbd></span
          >
          <span style="font-size: 12.5px; color: var(--text-muted)">ouvrir la palette</span>
        </div>
      </div>
      <div class="card">
        <div class="ds-section-title">Avatars · fallback initiales en gradient</div>
        <div style="display: flex; align-items: flex-end; gap: 14px">
          <div
            class="avatar"
            style="width: 24px; height: 24px; font-size: 10px; background: linear-gradient(135deg, var(--color-indigo-400), var(--color-indigo-700))"
          >
            LM
          </div>
          <div
            class="avatar"
            style="width: 32px; height: 32px; font-size: 12px; background: linear-gradient(135deg, oklch(0.7 0.13 200), oklch(0.5 0.16 264))"
          >
            TD
          </div>
          <div
            class="avatar"
            style="width: 40px; height: 40px; font-size: 14px; background: linear-gradient(135deg, oklch(0.72 0.13 75), oklch(0.55 0.18 25))"
          >
            YK
          </div>
          <div
            class="avatar"
            style="width: 48px; height: 48px; font-size: 17px; background: linear-gradient(135deg, oklch(0.7 0.13 155), oklch(0.5 0.14 200))"
          >
            SA
          </div>
        </div>
        <div class="ds-section-title" style="margin-top: 22px">Tooltip</div>
        <div style="position: relative; display: inline-block; margin-top: 28px">
          <span
            style="position: absolute; left: 50%; bottom: calc(100% + 8px); transform: translateX(-50%); white-space: nowrap; padding: 6px 10px; border-radius: 7px; background: var(--color-neutral-900); color: var(--color-neutral-50); font-size: 12px; font-weight: 500; box-shadow: var(--shadow-md)"
            >Validation auto via GitHub Actions</span
          >
          <button
            style="display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 12px; border: 1px solid var(--border-default); border-radius: 7px; background: var(--bg-surface); color: var(--text-default); font-family: inherit; font-size: 13px; font-weight: 500"
          >
            <i class="ti ti-info-circle"></i>Le harnais
          </button>
        </div>
        <div class="ds-section-title" style="margin-top: 28px">Skeleton (loading)</div>
        <div style="display: flex; flex-direction: column; gap: 9px">
          <div class="skel" style="width: 70%"></div>
          <div class="skel" style="width: 90%"></div>
          <div class="skel" style="width: 50%"></div>
        </div>
      </div>
    </div>
  </body>
</html>
