<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkbox · Radio · Switch — Cursus Design System</title>
    <!-- Référence statique extraite de Claude Design « Design system Cursus ».
         Source de vérité runtime : @nuxt/ui v4 <UCheckbox>/<URadioGroup>/<USwitch>. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="./_tokens.css" />
    <style>
      body {
        padding: 32px;
      }
      .card {
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        background: var(--bg-surface);
        padding: 26px;
        display: flex;
        gap: 48px;
        flex-wrap: wrap;
        align-items: flex-start;
        max-width: 760px;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .ctrl {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        font-size: 14px;
        color: var(--text-default);
      }
      .box-on {
        display: grid;
        place-items: center;
        width: 18px;
        height: 18px;
        border-radius: 5px;
        background: var(--accent);
      }
      .box-on i {
        font-size: 13px;
        color: #fff;
      }
      .box-off {
        display: block;
        width: 18px;
        height: 18px;
        border-radius: 5px;
        border: 1.5px solid var(--border-strong);
      }
      .radio-on {
        display: grid;
        place-items: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1.5px solid var(--accent);
      }
      .radio-on span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }
      .radio-off {
        display: block;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1.5px solid var(--border-strong);
      }
      .switch {
        position: relative;
        width: 38px;
        height: 22px;
        border-radius: 9999px;
        flex: none;
      }
      .switch.on {
        background: var(--accent);
      }
      .switch.off {
        background: var(--border-strong);
      }
      .switch .knob {
        position: absolute;
        top: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        box-shadow: var(--shadow-sm);
      }
      .switch.on .knob {
        left: 18px;
      }
      .switch.off .knob {
        left: 2px;
      }
    </style>
  </head>
  <body>
    <h1 style="font-size: 25px; color: var(--text-strong); margin: 0 0 22px">
      Checkbox · Radio · Switch
    </h1>
    <div class="card">
      <div class="col">
        <span class="ds-section-title">Checkbox</span>
        <label class="ctrl"
          ><span class="box-on"><i class="ti ti-check"></i></span>Notifier par email</label
        >
        <label class="ctrl"><span class="box-off"></span>Rappel J-1</label>
      </div>
      <div class="col">
        <span class="ds-section-title">Radio</span>
        <label class="ctrl"><span class="radio-on"><span></span></span>Dev web</label>
        <label class="ctrl"><span class="radio-off"></span>Cybersécurité</label>
      </div>
      <div class="col">
        <span class="ds-section-title">Switch</span>
        <label class="ctrl"><span class="switch on"><span class="knob"></span></span>Mode sombre auto</label>
        <label class="ctrl"><span class="switch off"><span class="knob"></span></span>Mode sombre off</label>
      </div>
    </div>
  </body>
</html>
