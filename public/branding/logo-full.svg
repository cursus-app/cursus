<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" role="img" aria-label="Cursus">
  <title>Cursus</title>
  <desc>Logo Cursus : un cercle de progression qui se ferme par une coche, suivi du wordmark Cursus.</desc>

  <defs>
    <linearGradient id="cursus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="oklch(0.62 0.20 264)" />
      <stop offset="100%" stop-color="oklch(0.50 0.24 270)" />
    </linearGradient>
  </defs>

  <!-- Icon: progress ring + checkmark -->
  <g transform="translate(10, 10)">
    <!-- Track ring (subtle) -->
    <circle cx="40" cy="40" r="32" fill="none"
            stroke="oklch(0.55 0.22 264)" stroke-opacity="0.15" stroke-width="8" />

    <!-- Progress arc (~75%, opens at top-right) -->
    <path d="M 40 8
             A 32 32 0 1 0 67.71 56"
          fill="none"
          stroke="url(#cursus-grad)"
          stroke-width="8"
          stroke-linecap="round" />

    <!-- Checkmark inside -->
    <path d="M 26 41 L 36 51 L 56 31"
          fill="none"
          stroke="oklch(0.55 0.22 264)"
          stroke-width="7"
          stroke-linecap="round"
          stroke-linejoin="round" />
  </g>

  <!-- Wordmark -->
  <g transform="translate(105, 0)" fill="oklch(0.18 0.02 264)">
    <text x="0" y="65"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="42"
          font-weight="600"
          letter-spacing="-1.5">Cursus</text>
  </g>
</svg>
