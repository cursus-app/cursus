  <style>
    .ring-track { stroke: oklch(0.55 0.22 264); stroke-opacity: 0.18; }
    .ring-progress { stroke: oklch(0.55 0.22 264); }
    .check { stroke: oklch(0.55 0.22 264); }
    @media (prefers-color-scheme: dark) {
      .ring-track { stroke: oklch(0.78 0.16 264); stroke-opacity: 0.22; }
