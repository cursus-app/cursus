# Lefthook — Git hooks orchestrator.
# Cf. 09-engineering-playbook §1.3 (pre-commit + pre-push)

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: '*.{js,ts,vue,mjs,cjs}'
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: '*.{js,ts,vue,mjs,cjs,json,md,yml,yaml,css}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{ts,vue}'
      # Typecheck rapide : on s'appuie sur vue-tsc projet entier (incrémental).
      # Pour aller plus vite encore en local on pourrait scoper, mais
      # les types Nuxt/Vue rendent le scope-par-fichier peu fiable.
      run: pnpm typecheck
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test:run
    gitleaks-full:
      run: gitleaks detect --no-banner --redact
