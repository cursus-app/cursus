apiVersion: 1

datasources:
  - name: Cursus Postgres
    type: postgres
    uid: cursus-postgres
    url: ${SUPABASE_DB_HOST}:5432
    user: ${SUPABASE_DB_USER}
    secureJsonData:
      password: ${SUPABASE_DB_PASSWORD}
    jsonData:
      database: ${SUPABASE_DB_NAME}
      sslmode: require
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    # Connexion en lecture seule via réplique Supabase
    # Ne jamais utiliser les credentials de l'utilisateur admin
    isDefault: true
    editable: false
